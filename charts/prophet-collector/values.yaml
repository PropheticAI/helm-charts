# Prophet Collector Helm Chart - values.yaml
#
# Service configuration (what to collect, interfaces, performance) comes from
# the controller via the node profile. Only bootstrap settings are needed here.

# -- Provision token for node registration (required)
# Get this from the Prophet UI: Nodes > New Node or Nodes > Profiles > Deploy
provisionToken: ""

# -- Profile ID to inherit configuration from (optional but recommended)
# Get this from the Prophet UI: Nodes > Profiles
profileId: ""

# -- Prophet environment (prod or dev)
env: prod

# -- Container image configuration
image:
  repository: propheticai/go-collector
  tag: latest
  pullPolicy: Always

# -- Image pull secrets (needed for private repos like go-collector-debug)
imagePullSecrets: []

# -- Persistent storage for collector state (credentials, node_id, binary, tags)
persistence:
  # -- Host path on each node for collector state. Matches the container path
  # so operators can read tags.txt and other files without translating paths.
  hostPath: /usr/local/prophet

# -- Resource requests/limits (collector auto-scales memory based on system RAM)
resources: {}

# -- Node selector for scheduling
nodeSelector: {}

# -- Tolerations (to run on all nodes including masters)
tolerations:
  - operator: Exists

# -- Additional environment variables
extraEnv: []
