apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "prophet-collector.fullname" . }}
  labels:
    {{- include "prophet-collector.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "prophet-collector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prophet-collector.selectorLabels" . | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
          env:
            # Bootstrap — auth + identity only
            # Service config (what to collect, interfaces, performance) comes
            # from the controller via the node profile.
            - name: env
              value: {{ .Values.env | quote }}
            - name: org_token
              valueFrom:
                secretKeyRef:
                  name: {{ include "prophet-collector.fullname" . }}
                  key: org-token
            {{- if .Values.profileId }}
            - name: PROFILE_ID
              value: {{ .Values.profileId | quote }}
            {{- end }}
            # Identity — use K8s node name for stable per-pod identity
            - name: dynamic_node
              value: "true"
            - name: hostname
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: prophet-state
              mountPath: /usr/local/prophet
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: prophet-state
          {{- if .Values.persistence.enabled }}
          hostPath:
            path: {{ .Values.persistence.hostPath | default "/var/lib/prophet-collector" }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
